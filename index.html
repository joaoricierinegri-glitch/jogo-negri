<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nave Estelar - Versão Completa</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #00ffcc; font-family: 'Courier New', monospace; }
        canvas { border: 2px solid #00ffcc; background: #000; display: none; box-shadow: 0 0 20px #00ffcc; }
        #menu { text-align: center; border: 2px solid #00ffcc; padding: 40px; background: rgba(0,0,0,0.9); }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; color: #000; }
        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 18px; line-height: 1.5; }
        .boss-bar { width: 200px; height: 10px; background: #333; border: 1px solid white; display: none; margin-top: 5px; }
        #boss-hp { width: 100%; height: 100%; background: red; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>GALACTIC DEFENDER: FULL</h1>
        <p>SETAS: Mover | ESPAÇO: Atirar</p>
        <button onclick="iniciar()">INICIAR MISSÃO</button>
    </div>

    <div id="ui">
        PONTOS: <span id="pts">0</span> | VIDAS: <span id="vds">3</span><br>
        <span id="status-power" style="color: gold;"></span>
        <div id="boss-ui">
            <div id="boss-text" style="color: red; font-weight: bold;"></div>
            <div class="boss-bar" id="boss-container"><div id="boss-hp"></div></div>
        </div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let pontos = 0, vidas = 3, ativo = false, audioCtx;
        const nave = { x: 180, y: 530, w: 40, h: 40, escudo: false, triplo: false };
        const tiros = [], inimigos = [], tirosInimigos = [], powerups = [], estrelas = [];
        const teclas = {};
        let boss = { ativo: false, x: 50, y: -60, w: 100, h: 30, hp: 15, max: 15, dir: 1 };

        // Inicializa estrelas de fundo
        for(let i=0; i<50; i++) estrelas.push({x: Math.random()*400, y: Math.random()*600, v: Math.random()*2 + 1});

        function som(f, t, d, gVal = 0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(gVal, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        window.onkeydown = e => { 
            teclas[e.key] = true; 
            if(e.key === " " && ativo) {
                disparar();
            }
        };
        window.onkeyup = e => teclas[e.key] = false;

        function disparar() {
            tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: 0});
            if(nave.triplo) {
                tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: -2});
                tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: 2});
            }
            som(500, 'triangle', 0.1);
        }

        function iniciar() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true; loop();
        }

        function spawnPowerUp() {
            const tipo = Math.random() > 0.5 ? 'escudo' : 'triplo';
            powerups.push({x: Math.random()*370, y: -30, tipo: tipo, w: 20, h: 20});
        }

        function loop() {
            if(!ativo) return;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Fundo de estrelas
            ctx.fillStyle = "white";
            estrelas.forEach(s => {
                s.y += s.v;
                if(s.y > 600) s.y = 0;
                ctx.fillRect(s.x, s.y, 2, 2);
            });

            // Movimento Nave
            if((teclas.ArrowLeft || teclas.a) && nave.x > 0) nave.x -= 7;
            if((teclas.ArrowRight || teclas.d) && nave.x < 360) nave.x += 7;

            // Lógica do Boss
            if(!boss.ativo && pontos > 0 && pontos % 100 === 0) {
                boss.ativo = true; boss.hp = 15;
                document.getElementById("boss-container").style.display = "block";
                document.getElementById("boss-text").innerText = "ALERTA: CHEFÃO!";
            }

            if(boss.ativo) {
                boss.y = Math.min(boss.y + 2, 50);
                boss.x += boss.dir * 3;
                if(boss.x <= 0 || boss.x >= 300) boss.dir *= -1;
                if(Math.random() < 0.03) tirosInimigos.push({x: boss.x + 50, y: boss.y + 30, w: 6, h: 15});
                
                // Desenha Boss
                ctx.fillStyle = "red";
                ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                ctx.fillStyle = "white";
                ctx.fillRect(boss.x + 10, boss.y + 10, 20, 10);
                ctx.fillRect(boss.x + 70, boss.y + 10, 20, 10);
            } else if(Math.random() < 0.02) {
                inimigos.push({x: Math.random()*360, y: -40, v: 3 + (pontos/100)});
            }

            if(Math.random() < 0.002) spawnPowerUp();

            // Atualiza Tiros
            tiros.forEach((t, i) => {
                t.y -= 10; t.x += (t.vx || 0);
                ctx.fillStyle = "#00ffff";
                ctx.fillRect(t.x, t.y, t.w, t.h);
                if(t.y < 0) tiros.splice(i, 1);

                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) {
                        boss.ativo = false; pontos += 50; boss.y = -60;
                        document.getElementById("boss-container").style.display = "none";
                        document.getElementById("boss-text").innerText = "";
                    }
                }
            });

            // Tiros Inimigos
            tirosInimigos.forEach((t, i) => {
                t.y += 6;
                ctx.fillStyle = "yellow";
                ctx.fillRect(t.x, t.y, t.w, t.h);
                if(t.x < nave.x + 40 && t.x + 6 > nave.x && t.y > nave.y && t.y < nave.y + 40) {
                    tirosInimigos.splice(i,1); if(!nave.escudo) vidas--; som(80, 'sawtooth', 0.2);
                }
            });

            // Power-ups
            powerups.forEach((p, i) => {
                p.y += 3;
                ctx.fillStyle = p.tipo === 'escudo' ? 'cyan' : 'gold';
                ctx.beginPath(); ctx.arc(p.x+10, p.y+10, 10, 0, 7); ctx.fill();
                if(nave.x < p.x + 20 && nave.x + 40 > p.x && nave.y < p.y + 20) {
                    ativarPower(p.tipo); powerups.splice(i,1);
                }
            });

            // Inimigos
            inimigos.forEach((m, i) => {
                m.y += m.v;
                ctx.fillStyle = "#888";
                ctx.beginPath(); ctx.arc(m.x+20, m.y+20, 18, 0, 7); ctx.fill();
                if(nave.x < m.x + 35 && nave.x + 40 > m.x && nave.y < m.y + 35) {
                    inimigos.splice(i,1); if(!nave.escudo) vidas--; som(80, 'sawtooth', 0.2);
                }
                tiros.forEach((t, ti) => {
                    if(t.x < m.x + 40 && t.x + 4 > m.x && t.y < m.y + 40) {
                        inimigos.splice(i,1); tiros.splice(ti,1); pontos += 10; som(200, 'sine', 0.05);
                    }
                });
                if(m.y > 600) inimigos.splice(i,1);
            });

            // Desenha Nave
            ctx.fillStyle = nave.escudo ? "cyan" : "#00ffcc";
            ctx.beginPath();
            ctx.moveTo(nave.x + 20, nave.y);
            ctx.lineTo(nave.x, nave.y + 40);
            ctx.lineTo(nave.x + 40, nave.y + 40);
            ctx.fill();
            if(nave.escudo) { ctx.strokeStyle = "white"; ctx.strokeRect(nave.x-5, nave.y-5, 50, 50); }

            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            if(vidas <= 0) { alert("FIM DE JOGO! PONTOS: " + pontos); location.reload(); }
            requestAnimationFrame(loop);
        }

        function ativarPower(tipo) {
            if(tipo === 'escudo') {
                nave.escudo = true; document.getElementById("status-power").innerText = "ESCUDO ATIVO!";
                setTimeout(() => { nave.escudo = false; document.getElementById("status-power").innerText = ""; }, 6000);
            } else {
                nave.triplo = true; document.getElementById("status-power").innerText = "TIRO TRIPLO!";
                setTimeout(() => { nave.triplo = false; document.getElementById("status-power").innerText = ""; }, 8000);
            }
            som(800, 'sine', 0.2, 0.2);
        }
    </script>
</body>
</html>
