<div class="container">
    <form id="form-cadastro">
        <h2>Cadastro Premium</h2>
        
        <div class="input-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="cep">CEP (Digite para buscar)</label>
                <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
            </div>
            <div class="input-group">
                <label for="logradouro">Rua</label>
                <input type="text" id="logradouro" readonly>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" readonly>
            </div>
            <div class="input-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" readonly>
            </div>
        </div>

        <button type="submit" class="btn-submit">Finalizar Cadastro</button>
    </form>
</div>

<div class="container" style="margin-top: 20px; max-width: 900px;">
    <h3>Lista de Clientes Salvos</h3>
    <div id="lista-cards" class="grid-clientes">
        </div>
</div>
