<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Galactic Infinite Battle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ffe81f; font-family: 'Arial Black', sans-serif; }
        canvas { border: 2px solid #ffe81f; background: #000; display: none; box-shadow: 0 0 30px rgba(255, 232, 31, 0.2); }
        #menu { text-align: center; border: 3px solid #ffe81f; padding: 50px; background: rgba(0,0,0,0.9); border-radius: 10px; }
        button { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #ffe81f; border: none; font-weight: bold; color: #000; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.1); }
        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 18px; text-shadow: 2px 2px #000; }
        .boss-bar { width: 300px; height: 12px; background: #222; border: 2px solid #fff; display: none; margin-top: 5px; }
        #boss-hp { width: 100%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAR WARS</h1>
        <p>Batalha Galáctica Infinita</p>
        <p>RECORDE: <span id="hs-menu">0</span></p>
        <button onclick="iniciar()">DECOLAR X-WING</button>
    </div>

    <div id="ui">
        PONTOS: <b id="pts">0</b> | ESCUDOS: <b id="vds">3</b><br>
        <span id="pwr-text" style="color: #00ffff;"></span>
        <div id="boss-ui">
            <div id="boss-label" style="color: #ff0000; font-weight: bold; margin-top: 10px;">DESTRUIDOR ESTELAR</div>
            <div class="boss-bar" id="boss-container"><div id="boss-hp"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 450; canvas.height = 650;

        // --- IMAGENS REAIS (LINKS QUE VOCÊ PEDIU) ---
        const imgNave = new Image(); imgNave.src = 'http://googleusercontent.com/image_collection/image_retrieval/17266641394254757826_0';
        const imgMeteoro = new Image(); imgMeteoro.src = 'http://googleusercontent.com/image_collection/image_retrieval/3103048708691750151_0';
        const imgFundo = new Image(); imgFundo.src = 'http://googleusercontent.com/image_collection/image_retrieval/9520908051246567451_0';
        const imgBoss = new Image(); imgBoss.src = 'https://i.imgur.com/WvXGjYp.png';

        let pontos = 0, vidas = 3, ativo = false, audioCtx;
        let recorde = localStorage.getItem("sw_recorde") || 0;
        let proximoBoss = 150;
        document.getElementById("hs-menu").innerText = recorde;

        const nave = { x: 200, y: 550, w: 60, h: 60, esc: false, trip: false };
        const tiros = [], inimigos = [], tirosInim = [], powers = [];
        const teclas = {};
        let boss = { ativo: false, x: 100, y: -120, w: 200, h: 100, hp: 30, max: 30, dir: 1, nivel: 1 };

        // Sons de Cinema
        function som(f, t, d, gVal = 0.05) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + d);
            g.gain.setValueAtTime(gVal, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        window.onkeydown = e => { teclas[e.key] = true; if(e.key === " " && ativo) atirar(); };
        window.onkeyup = e => teclas[e.key] = false;

        function atirar() {
            tiros.push({x: nave.x + 28, y: nave.y, w: 4, h: 20, vx: 0});
            if(nave.trip) {
                tiros.push({x: nave.x + 28, y: nave.y, w: 4, h: 20, vx: -3});
                tiros.push({x: nave.x + 28, y: nave.y, w: 4, h: 20, vx: 3});
            }
            som(440, 'square', 0.1);
        }

        function iniciar() {
            audioCtx = new AudioContext();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true; loop();
        }

        function loop() {
            if(!ativo) return;
            
            // Fundo
            if(imgFundo.complete) ctx.drawImage(imgFundo, 0, 0, 450, 650);
            else { ctx.fillStyle = "black"; ctx.fillRect(0,0,450,650); }

            // Movimento Nave
            if((teclas.ArrowLeft || teclas.a) && nave.x > 0) nave.x -= 8;
            if((teclas.ArrowRight || teclas.d) && nave.x < 390) nave.x += 8;

            // Lógica do Boss Infinito
            if(!boss.ativo && pontos >= proximoBoss) {
                boss.ativo = true; boss.hp = 30 + (boss.nivel * 20); boss.max = boss.hp;
                document.getElementById("boss-container").style.display = "block";
                som(100, 'sawtooth', 0.5);
            }

            if(boss.ativo) {
                boss.y = Math.min(boss.y + 1, 50); boss.x += boss.dir * (2 + boss.nivel);
                if(boss.x <= 0 || boss.x >= 250) boss.dir *= -1;
                if(Math.random() < 0.04) tirosInim.push({x: boss.x + boss.w/2, y: boss.y + boss.h});
                if(imgBoss.complete) ctx.drawImage(imgBoss, boss.x, boss.y, boss.w, boss.h);
                else { ctx.fillStyle = "red"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); }
            } else {
                if(Math.random() < 0.03) inimigos.push({x: Math.random()*400, y: -60, v: 4 + (pontos/500)});
            }

            if(Math.random() < 0.002) powers.push({x: Math.random()*400, y: -30, t: Math.random()>0.5?'escudo':'tiro'});

            atualizarTudo();

            // Desenha X-Wing
            if(imgNave.complete) {
                if(nave.esc) { ctx.shadowBlur = 20; ctx.shadowColor = "cyan"; }
                ctx.drawImage(imgNave, nave.x, nave.y, nave.w, nave.h);
                ctx.shadowBlur = 0;
            } else { ctx.fillStyle = "white"; ctx.fillRect(nave.x, nave.y, nave.w, nave.h); }

            if(pontos > recorde) { recorde = pontos; localStorage.setItem("sw_recorde", recorde); }
            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            if(vidas <= 0) { alert("A FORÇA SE FOI... SCORE: " + pontos); location.reload(); }
            requestAnimationFrame(loop);
        }

        function atualizarTudo() {
            // Tiros Laser
            tiros.forEach((t, i) => {
                t.y -= 15; t.x += t.vx;
                ctx.fillStyle = "#f00"; ctx.shadowBlur = 10; ctx.shadowColor = "red";
                ctx.fillRect(t.x, t.y, t.w, t.h); ctx.shadowBlur = 0;
                if(t.y < 0) tiros.splice(i, 1);
                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) {
                        boss.ativo = false; boss.nivel++; pontos += 500; proximoBoss += 800;
                        document.getElementById("boss-container").style.display = "none";
                        som(60, 'sawtooth', 0.5);
                    }
                }
            });

            // Tiros Inimigos
            tirosInim.forEach((t, i) => {
                t.y += 8; ctx.fillStyle = "#0f0"; ctx.fillRect(t.x, t.y, 4, 15);
                if(t.x > nave.x && t.x < nave.x+60 && t.y > nave.y && t.y < nave.y+60) {
                    tirosInim.splice(i, 1); if(!nave.esc) vidas--; som(80, 'sawtooth', 0.2);
                }
                if(t.y > 650) tirosInim.splice(i, 1);
            });

            // Meteoros
            inimigos.forEach((m, i) => {
                m.y += m.v;
                if(imgMeteoro.complete) ctx.drawImage(imgMeteoro, m.x, m.y, 50, 50);
                else { ctx.fillStyle = "gray"; ctx.fillRect(m.x, m.y, 50, 50); }
                if(nave.x < m.x + 40 && nave.x + 60 > m.x && nave.y < m.y + 40) {
                    inimigos.splice(i, 1); if(!nave.esc) vidas--; som(80, 'sawtooth', 0.2);
                }
                tiros.forEach((t, ti) => {
                    if(t.x > m.x && t.x < m.x + 50 && t.y < m.y + 50) {
                        inimigos.splice(i, 1); tiros.splice(ti, 1); pontos += 10;
                    }
                });
                if(m.y > 650) inimigos.splice(i, 1);
            });

            // Power-ups
            powers.forEach((p, i) => {
                p.y += 3; ctx.fillStyle = p.t==='escudo'?'#0af':'#f0f';
                ctx.beginPath(); ctx.arc(p.x+10, p.y+10, 12, 0, 7); ctx.fill();
                if(nave.x < p.x + 30 && nave.x + 60 > p.x && nave.y < p.y + 60) {
                    if(p.t === 'escudo') {
                        nave.esc = true; document.getElementById("pwr-text").innerText = "ESCUDO!";
                        setTimeout(() => { nave.esc = false; document.getElementById("pwr-text").innerText = ""; }, 8000);
                    } else {
                        nave.trip = true; document.getElementById("pwr-text").innerText = "TIRO TRIPLO!";
                        setTimeout(() => { nave.trip = false; document.getElementById("pwr-text").innerText = ""; }, 12000);
                    }
                    powers.splice(i, 1); som(800, 'sine', 0.2);
                }
            });
        }
    </script>
</body>
</html>
