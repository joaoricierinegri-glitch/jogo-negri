<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Final Battle</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ffe81f; font-family: 'Arial Black', sans-serif; }
        canvas { border: 3px solid #ffe81f; background: #000; display: none; box-shadow: 0 0 20px #ffe81f; }
        #menu { text-align: center; border: 3px solid #ffe81f; padding: 50px; background: rgba(0,0,0,0.9); border-radius: 15px; }
        button { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #ffe81f; border: none; font-weight: bold; color: black; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 22px; text-shadow: 2px 2px #000; pointer-events: none; }
        .boss-hp-container { width: 300px; height: 15px; background: #222; border: 2px solid #ff0000; display: none; margin-top: 10px; }
        #boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(to right, #ff0000, #990000); transition: 0.2s; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 45px; margin: 0;">STAR WARS</h1>
        <p style="color: #fff;">BATALHA GALÁCTICA PRO</p>
        <button onclick="iniciar()">DECOLAR X-WING</button>
    </div>

    <div id="ui">
        SCORE: <b id="pts">0</b> | <span style="color: #ff4444;">VIDAS: <b id="vds">10</b></span><br>
        <div id="boss-ui">
            <div id="boss-label" style="color: red; font-size: 14px; margin-top: 10px; font-weight: bold;"></div>
            <div class="boss-hp-container" id="boss-cont"><div id="boss-hp-fill"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 500; canvas.height = 700;

        // --- IMAGENS SELECIONADAS (LINKS DIRETOS) ---
        const imgNave = new Image(); imgNave.src = 'https://i.imgur.com/6S79m7v.png'; // X-Wing
        const imgMeteoro = new Image(); imgMeteoro.src = 'https://i.imgur.com/8Bv9szM.png'; // Asteróide
        const imgFundo = new Image(); imgFundo.src = 'https://i.imgur.com/re9ZpX9.jpg'; // Espaço
        const imgBoss = new Image(); imgBoss.src = 'https://i.imgur.com/WvXGjYp.png'; // Nave do Boss

        let pontos = 0, vidas = 10, ativo = false, audioCtx;
        let pBoss = 300, bNivel = 1;
        const nave = { x: 220, y: 600, w: 60, h: 60, esc: false };
        const tiros = [], inimigos = [], tirosInim = [];
        const teclas = {};
        let boss = { ativo: false, x: 150, y: -200, w: 200, h: 120, hp: 100, max: 100, dir: 1 };

        function iniciar() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true; loop();
        }

        window.onkeydown = e => { teclas[e.code] = true; if(e.code === "Space" && ativo) atirar(); };
        window.onkeyup = e => teclas[e.code] = false;

        function atirar() {
            tiros.push({x: nave.x + 28, y: nave.y, w: 4, h: 20});
        }

        function loop() {
            if(!ativo) return;
            
            // Fundo
            if(imgFundo.complete) ctx.drawImage(imgFundo, 0, 0, 500, 700);
            else { ctx.fillStyle = "#000"; ctx.fillRect(0,0,500,700); }

            // Movimento
            if((teclas.ArrowLeft || teclas.KeyA) && nave.x > 0) nave.x -= 8;
            if((teclas.ArrowRight || teclas.KeyD) && nave.x < 440) nave.x += 8;

            // Boss
            if(!boss.ativo && pontos >= pBoss) {
                boss.ativo = true; boss.hp = 100; boss.max = 100;
                document.getElementById("boss-cont").style.display = "block";
                document.getElementById("boss-label").innerText = "ALVO PRIORITÁRIO DETECTADO";
            }

            if(boss.ativo) {
                boss.y = Math.min(boss.y + 1, 50);
                boss.x += boss.dir * 3;
                if(boss.x <= 0 || boss.x >= 300) boss.dir *= -1;
                if(Math.random() < 0.05) tirosInim.push({x: boss.x + boss.w/2, y: boss.y + boss.h});
                ctx.drawImage(imgBoss, boss.x, boss.y, boss.w, boss.h);
            } else {
                if(Math.random() < 0.04) inimigos.push({x: Math.random()*450, y: -60, v: 5});
            }

            atualizarJogo();

            // Nave
            ctx.drawImage(imgNave, nave.x, nave.y, nave.w, nave.h);

            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            if(vidas <= 0) { alert("A ALIANÇA FOI DERROTADA! SCORE: " + pontos); location.reload(); }
            requestAnimationFrame(loop);
        }

        function atualizarJogo() {
            tiros.forEach((t, i) => {
                t.y -= 15; ctx.fillStyle = "red"; ctx.fillRect(t.x, t.y, t.w, t.h);
                if(t.y < 0) tiros.splice(i, 1);
                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp-fill").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) {
                        boss.ativo = false; pontos += 2000; pBoss += 5000;
                        document.getElementById("boss-cont").style.display = "none";
                    }
                }
            });

            tirosInim.forEach((t, i) => {
                t.y += 10; ctx.fillStyle = "#0f0"; ctx.fillRect(t.x, t.y, 6, 20);
                if(t.x > nave.x && t.x < nave.x+60 && t.y > nave.y && t.y < nave.y+60) {
                    tirosInim.splice(i, 1); vidas--;
                }
            });

            inimigos.forEach((m, i) => {
                m.y += m.v; ctx.drawImage(imgMeteoro, m.x, m.y, 55, 55);
                if(nave.x < m.x + 45 && nave.x + 60 > m.x && nave.y < m.y + 45) {
                    inimigos.splice(i, 1); vidas--;
                }
                tiros.forEach((t, ti) => {
                    if(t.x > m.x && t.x < m.x + 55 && t.y < m.y + 55) {
                        inimigos.splice(i, 1); tiros.splice(ti, 1); pontos += 20;
                    }
                });
                if(m.y > 700) inimigos.splice(i, 1);
            });
        }
    </script>
</body>
</html>
