<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Master 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --bg: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body {
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Card Principal 3D */
        .card-3d {
            background: var(--bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), 
                       -20px -20px 60px var(--shadow-light);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        h2 { color: #444; font-weight: 800; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 25px; text-align: left; }

        input {
            width: 100%;
            padding: 15px;
            background: var(--bg);
            border: none;
            border-radius: 12px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border: 1px solid var(--primary); }

        .btn-3d {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: 0.2s;
        }

        .btn-3d:active { transform: scale(0.96); box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); }

        /* Modal de Sucesso */
        #modal-sucesso {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            text-align: center;
            animation: popIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { to { transform: translate(-50%, -50%) scale(1); } }

        .check-icon {
            font-size: 50px;
            color: var(--success);
            margin-bottom: 15px;
            display: block;
        }

        /* Tabela Estilizada */
        .lista-container {
            margin-top: 50px;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { color: var(--primary); padding: 15px; border-bottom: 2px solid #ccd1d9; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }

    </style>
</head>
<body>

    <div class="card-3d">
        <h2>Novo Cliente</h2>
        <form id="form">
            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome do Cliente" required>
            </div>
            <div class="input-group">
                <input type="text" id="cpf" placeholder="CPF (000.000.000-00)" required>
            </div>
            <button type="submit" class="btn-3d">CADASTRAR AGORA</button>
        </form>
    </div>

    <div id="modal-sucesso">
        <span class="check-icon">✔</span>
        <h3>Sucesso Total!</h3>
        <p>O cliente foi adicionado à lista.</p>
        <button onclick="fecharModal()" style="padding: 8px 20px; cursor:pointer;">OK</button>
    </div>

    <div class="lista-container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const form = document.getElementById('form');
        const modal = document.getElementById('modal-sucesso');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 1. Adiciona na tabela
            const nome = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;
            document.getElementById('tabela-corpo').innerHTML += `<tr><td>${nome}</td><td>${cpf}</td></tr>`;

            // 2. Dispara Confetes
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#22c55e', '#ffffff']
            });

            // 3. Mostra Modal
            modal.style.display = 'block';
            
            form.reset();
        });

        function fecharModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
