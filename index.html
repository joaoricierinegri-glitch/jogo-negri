<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Galactic Command</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ffe81f; font-family: 'Arial Black', sans-serif; }
        canvas { border: 2px solid #ffe81f; display: none; box-shadow: 0 0 30px rgba(255, 232, 31, 0.4); }
        
        #menu { text-align: center; border: 3px solid #ffe81f; padding: 40px; background: rgba(0,0,0,0.95); border-radius: 10px; width: 400px; }
        h1 { font-size: 40px; margin: 0 0 20px 0; }
        
        .dificuldade-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-dif { padding: 15px; font-size: 18px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; border-radius: 5px; }
        
        .facil { background: #2ecc71; color: white; }
        .medio { background: #f1c40f; color: black; }
        .dificil { background: #e74c3c; color: white; }
        .btn-dif:hover { transform: scale(1.05); filter: brightness(1.2); }

        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 18px; text-shadow: 2px 2px #000; pointer-events: none; }
        .boss-container { width: 300px; height: 12px; background: #222; border: 2px solid #fff; display: none; margin-top: 5px; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAR WARS</h1>
        <p>SELECIONE O NÍVEL DE DIFICULDADE</p>
        <div class="dificuldade-container">
            <button class="btn-dif facil" onclick="iniciar('facil')">Fácil (Padawan)</button>
            <button class="btn-dif medio" onclick="iniciar('medio')">Médio (Cavaleiro Jedi)</button>
            <button class="btn-dif dificil" onclick="iniciar('dificil')">Difícil (Mestre Sith)</button>
        </div>
        <p style="margin-top: 20px; font-size: 14px; color: #aaa;">Recorde: <span id="hs-menu">0</span></p>
    </div>

    <div id="ui">
        PONTOS: <b id="pts">0</b> | VIDAS: <b id="vds">3</b><br>
        <span id="pwr-text" style="color: #0ff;"></span>
        <div id="boss-ui">
            <div style="color: red; font-size: 12px; font-weight: bold; margin-top: 10px;">DESTRUIDOR ESTELAR</div>
            <div class="boss-container" id="boss-box"><div id="boss-hp"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 450; canvas.height = 650;

        // Assets
        const imgNave = new Image(); imgNave.src = 'http://googleusercontent.com/image_collection/image_retrieval/17266641394254757826_0';
        const imgMeteoro = new Image(); imgMeteoro.src = 'http://googleusercontent.com/image_collection/image_retrieval/3103048708691750151_0';
        const imgFundo = new Image(); imgFundo.src = 'http://googleusercontent.com/image_collection/image_retrieval/9520908051246567451_0';
        const imgBoss = new Image(); imgBoss.src = 'https://i.imgur.com/WvXGjYp.png';

        let pontos = 0, vidas = 3, ativo = false, audioCtx, difConfig = {};
        let recorde = localStorage.getItem("sw_final_rec") || 0;
        document.getElementById("hs-menu").innerText = recorde;

        const nave = { x: 200, y: 550, w: 55, h: 55, esc: false, trip: false };
        const tiros = [], inimigos = [], tirosInim = [], powers = [], teclas = {};
        let boss = { ativo: false, x: 100, y: -150, w: 200, h: 100, hp: 50, max: 50, dir: 1, nivel: 1 };

        function tocarSom(f, t, d, v = 0.05) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + d);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function iniciar(nivel) {
            // Configurações de Dificuldade
            const configs = {
                'facil': { velInimigo: 3, spawnRate: 0.02, bossHP: 40, tiroBoss: 0.03 },
                'medio': { velInimigo: 5, spawnRate: 0.035, bossHP: 70, tiroBoss: 0.05 },
                'dificil': { velInimigo: 7, spawnRate: 0.05, bossHP: 120, tiroBoss: 0.08 }
            };
            difConfig = configs[nivel];
            
            audioCtx = new AudioContext();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true;
            loop();
        }

        window.onkeydown = e => { teclas[e.code] = true; if(e.code === "Space" && ativo) atirar(); };
        window.onkeyup = e => teclas[e.code] = false;

        function atirar() {
            tiros.push({x: nave.x + nave.w/2 - 2, y: nave.y, w: 4, h: 20, vx: 0});
            if(nave.trip) {
                tiros.push({x: nave.x + nave.w/2 - 2, y: nave.y, w: 4, h: 20, vx: -4});
                tiros.push({x: nave.x + nave.w/2 - 2, y: nave.y, w: 4, h: 20, vx: 4});
            }
            tocarSom(440, 'square', 0.1);
        }

        function loop() {
            if(!ativo) return;
            
            if(imgFundo.complete) ctx.drawImage(imgFundo, 0, 0, 450, 650);
            else { ctx.fillStyle = "#000"; ctx.fillRect(0,0,450,650); }

            if((teclas.ArrowLeft || teclas.KeyA) && nave.x > 0) nave.x -= 8;
            if((teclas.ArrowRight || teclas.KeyD) && nave.x < 395) nave.x += 8;

            // Logica Boss
            if(!boss.ativo && pontos > 0 && pontos % 1000 === 0) {
                boss.ativo = true; boss.hp = difConfig.bossHP * boss.nivel; boss.max = boss.hp;
                document.getElementById("boss-box").style.display = "block";
            }

            if(boss.ativo) {
                boss.y = Math.min(boss.y + 1, 60); boss.x += boss.dir * (2 + boss.nivel);
                if(boss.x <= 0 || boss.x >= 250) boss.dir *= -1;
                if(Math.random() < difConfig.tiroBoss) tirosInim.push({x: boss.x + boss.w/2, y: boss.y + boss.h});
                if(imgBoss.complete) ctx.drawImage(imgBoss, boss.x, boss.y, boss.w, boss.h);
            } else {
                if(Math.random() < difConfig.spawnRate) inimigos.push({x: Math.random()*400, y: -60, v: difConfig.velInimigo});
            }

            if(Math.random() < 0.003) powers.push({x: Math.random()*400, y: -40, t: Math.random()>0.5?'escudo':'tiro'});

            processarObjetos();

            // Nave
            if(nave.esc) { ctx.shadowBlur = 20; ctx.shadowColor = "#0ff"; }
            if(imgNave.complete) ctx.drawImage(imgNave, nave.x, nave.y, nave.w, nave.h);
            ctx.shadowBlur = 0;

            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            if(vidas <= 0) {
                if(pontos > recorde) localStorage.setItem("sw_final_rec", pontos);
                alert("FIM DE JOGO! SCORE: " + pontos); location.reload();
            }
            requestAnimationFrame(loop);
        }

        function processarObjetos() {
            // Tiros Jogador
            for(let i=tiros.length-1; i>=0; i--) {
                let t = tiros[i]; t.y -= 12; t.x += t.vx;
                ctx.fillStyle = "#f00"; ctx.fillRect(t.x, t.y, t.w, t.h);
                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) { boss.ativo = false; boss.nivel++; pontos += 500; document.getElementById("boss-box").style.display = "none"; }
                } else if(t.y < 0) tiros.splice(i, 1);
            }

            // Tiros Boss
            for(let i=tirosInim.length-1; i>=0; i--) {
                let t = tirosInim[i]; t.y += 8;
                ctx.fillStyle = "#0f0"; ctx.fillRect(t.x, t.y, 5, 15);
                if(t.x > nave.x && t.x < nave.x + nave.w && t.y > nave.y && t.y < nave.y + nave.h) {
                    tirosInim.splice(i, 1); if(!nave.esc) vidas--;
                } else if(t.y > 650) tirosInim.splice(i, 1);
            }

            // Inimigos
            for(let i=inimigos.length-1; i>=0; i--) {
                let m = inimigos[i]; m.y += m.v;
                if(imgMeteoro.complete) ctx.drawImage(imgMeteoro, m.x, m.y, 50, 50);
                if(nave.x < m.x + 40 && nave.x + nave.w > m.x && nave.y < m.y + 40) {
                    inimigos.splice(i, 1); if(!nave.esc) vidas--;
                }
                for(let j=tiros.length-1; j>=0; j--) {
                    if(tiros[j].x > m.x && tiros[j].x < m.x + 50 && tiros[j].y < m.y + 50) {
                        inimigos.splice(i, 1); tiros.splice(j, 1); pontos += 10; break;
                    }
                }
                if(m.y > 650) inimigos.splice(i, 1);
            }

            // Powerups
            for(let i=powers.length-1; i>=0; i--) {
                let p = powers[i]; p.y += 3;
                ctx.fillStyle = p.t === 'escudo' ? '#0af' : '#f0f';
                ctx.beginPath(); ctx.arc(p.x+15, p.y+15, 12, 0, 7); ctx.fill();
                if(nave.x < p.x + 30 && nave.x + nave.w > p.x && nave.y < p.y + nave.h) {
                    if(p.t === 'escudo') { nave.esc = true; setTimeout(()=>nave.esc=false, 8000); }
                    else { nave.trip = true; setTimeout(()=>nave.trip=false, 10000); }
                    powers.splice(i, 1); tocarSom(800, 'sine', 0.2);
                }
            }
        }
    </script>
</body>
</html>
