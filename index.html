<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nave: Power-Up Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', monospace; }
        canvas { border: 4px solid #444; background: #020202; }
        #ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        .info { font-size: 18px; margin-bottom: 5px; }
        .hp-bar { width: 200px; height: 10px; background: #333; border: 1px solid #fff; display: none; margin-top: 10px; }
        #boss-hp { width: 100%; height: 100%; background: red; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="info">Pontos: <span id="pontos">0</span></div>
        <div class="info">Vidas: <span id="vidas">3</span></div>
        <div id="status-power" class="info" style="color: cyan;"></div>
        <div class="hp-bar" id="hp-container"><div id="boss-hp"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const placarTxt = document.getElementById("pontos");
        const vidasTxt = document.getElementById("vidas");
        const powerTxt = document.getElementById("status-power");
        const bossBar = document.getElementById("hp-container");
        const bossHpInner = document.getElementById("boss-hp");

        canvas.width = 400; canvas.height = 600;

        let pontos = 0; let vidas = 3; let jogoAtivo = true;
        let nivel = 1; let velBase = 2;

        const nave = { x: 185, y: 540, w: 30, h: 30, vel: 8, cor: "#00ffcc", escudo: false, tiroTriplo: false };
        const asteroides = []; const tiros = []; const tirosInimigos = []; const powerups = [];
        const teclas = {};

        let boss = { ativo: false, x: 50, y: -50, w: 100, h: 20, vel: 3, hp: 15, maxHp: 15, dir: 1 };

        window.addEventListener("keydown", (e) => {
            teclas[e.key] = true;
            if (e.key === " " && jogoAtivo) {
                const xCentro = nave.x + nave.w / 2 - 2;
                tiros.push({ x: xCentro, y: nave.y, w: 4, h: 10, vel: 10 });
                if (nave.tiroTriplo) {
                    tiros.push({ x: xCentro - 15, y: nave.y + 10, w: 4, h: 10, vel: 10, angulo: -0.2 });
                    tiros.push({ x: xCentro + 15, y: nave.y + 10, w: 4, h: 10, vel: 10, angulo: 0.2 });
                }
            }
        });
        window.addEventListener("keyup", (e) => teclas[e.key] = false);

        function criarPowerUp() {
            const tipos = ['escudo', 'triplo'];
            const tipo = tipos[Math.floor(Math.random() * tipos.length)];
            powerups.push({ x: Math.random() * 370, y: -30, w: 25, h: 25, vel: 3, tipo: tipo });
        }

        function atualizar() {
            if (!jogoAtivo) return;

            if ((teclas["ArrowLeft"] || teclas["a"]) && nave.x > 0) nave.x -= nave.vel;
            if ((teclas["ArrowRight"] || teclas["d"]) && nave.x < canvas.width - nave.w) nave.x += nave.vel;

            if (!boss.ativo && pontos > 0 && pontos % 60 === 0) { boss.ativo = true; boss.y = 50; bossBar.style.display = "block"; }
            if (!boss.ativo && Math.random() < 0.02) criarAsteroide();
            if (Math.random() < 0.003) criarPowerUp();

            // Boss
            if (boss.ativo) {
                boss.x += boss.vel * boss.dir;
                if (boss.x <= 0 || boss.x >= canvas.width - boss.w) boss.dir *= -1;
                if (Math.random() < 0.04) tirosInimigos.push({ x: boss.x + boss.w/2, y: boss.y + 20, w: 5, h: 15, vel: 5 });
            }

            // Tiros Jogador
            for (let i = tiros.length - 1; i >= 0; i--) {
                tiros[i].y -= tiros[i].vel;
                if (tiros[i].angulo) tiros[i].x += tiros[i].angulo * 10;
                
                if (boss.ativo && tiros[i].x < boss.x + boss.w && tiros[i].x + tiros[i].w > boss.x && tiros[i].y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    bossHpInner.style.width = (boss.hp/boss.maxHp*100) + "%";
                    if (boss.hp <= 0) { boss.ativo = false; bossBar.style.display="none"; pontos += 100; boss.hp = 15; }
                    continue;
                }
                if (tiros[i] && (tiros[i].y < 0 || tiros[i].x < 0 || tiros[i].x > canvas.width)) tiros.splice(i, 1);
            }

            // Powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i]; p.y += p.vel;
                if (nave.x < p.x + p.w && nave.x + nave.w > p.x && nave.y < p.y + p.h) {
                    ativarPower(p.tipo); powerups.splice(i, 1);
                } else if (p.y > canvas.height) powerups.splice(i, 1);
            }

            // Asteroides e Tiros Inimigos (Dano)
            processarDano(asteroides, true);
            processarDano(tirosInimigos, false);

            placarTxt.innerText = pontos;
        }

        function ativarPower(tipo) {
            if (tipo === 'escudo') {
                nave.escudo = true; powerTxt.innerText = "ESCUDO ATIVO!";
                setTimeout(() => { nave.escudo = false; powerTxt.innerText = ""; }, 5000);
            } else {
                nave.tiroTriplo = true; powerTxt.innerText = "TIRO TRIPLO!";
                setTimeout(() => { nave.tiroTriplo = false; powerTxt.innerText = ""; }, 7000);
            }
        }

        function processarDano(lista, ganhaPonto) {
            for (let i = lista.length - 1; i >= 0; i--) {
                let item = lista[i]; item.y += item.vel;
                if (nave.x < item.x + item.w && nave.x + nave.w > item.x && nave.y < item.y + item.h) {
                    if (!nave.escudo) perderVida();
                    lista.splice(i, 1);
                } else if (item.y > canvas.height) {
                    lista.splice(i, 1); if(ganhaPonto) pontos++;
                }
                // Colisão tiro-asteroide
                if (ganhaPonto) {
                    for (let j = tiros.length - 1; j >= 0; j--) {
                        if (tiros[j].x < item.x + item.w && tiros[j].x + tiros[j].w > item.x && tiros[j].y < item.y + item.h) {
                            lista.splice(i, 1); tiros.splice(j, 1); pontos += 2; break;
                        }
                    }
                }
            }
        }

        function criarAsteroide() {
            if (boss.ativo) return;
            const tam = Math.random() * 30 + 20;
            asteroides.push({ x: Math.random() * (canvas.width - tam), y: -tam, w: tam, h: tam, vel: Math.random() * 2 + 3 });
        }

        function perderVida() {
            vidas--; vidasTxt.innerText = vidas;
            if (vidas <= 0) { alert("FIM DE JOGO! Pontos: " + pontos); location.reload(); }
        }

        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar Nave com efeito de Escudo
            ctx.fillStyle = nave.escudo ? "cyan" : nave.cor;
            if (nave.escudo) { ctx.strokeStyle = "white"; ctx.strokeRect(nave.x-5, nave.y-5, nave.w+10, nave.h+10); }
            ctx.fillRect(nave.x, nave.y, nave.w, nave.h);

            ctx.fillStyle = "#ff0044"; tiros.forEach(t => ctx.fillRect(t.x, t.y, t.w, t.h));
            ctx.fillStyle = "yellow"; tirosInimigos.forEach(t => ctx.fillRect(t.x, t.y, t.w, t.h));
            ctx.fillStyle = "#888"; asteroides.forEach(a => ctx.fillRect(a.x, a.y, a.w, a.h));
            
            // Desenhar Power-ups
            powerups.forEach(p => {
                ctx.fillStyle = p.tipo === 'escudo' ? 'cyan' : 'gold';
                ctx.beginPath(); ctx.arc(p.x + 12, p.y + 12, 12, 0, Math.PI*2); ctx.fill();
            });

            if (boss.ativo) { ctx.fillStyle = "red"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); }
            requestAnimationFrame(() => { atualizar(); desenhar(); });
        }
        desenhar();
    </script>
</body>
</html>
