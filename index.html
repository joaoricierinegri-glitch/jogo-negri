<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nave: Galactic Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', monospace; }
        canvas { border: 4px solid #444; }
        #ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="info">Pontos: <span id="pontos">0</span></div>
        <div class="info">Vidas: <span id="vidas">3</span></div>
        <div id="status-power" style="color: cyan;"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        // --- CARREGAMENTO DE IMAGENS ---
        const imgNave = new Image();
        imgNave.src = 'nave.png'; // Substitua pelo caminho da sua imagem
        
        const imgAsteroide = new Image();
        imgAsteroide.src = 'asteroide.png'; // Substitua pelo caminho da sua imagem

        const imgFundo = new Image();
        imgFundo.src = 'fundo.jpg'; // Substitua pelo caminho da sua imagem

        let pontos = 0; let vidas = 3; let jogoAtivo = true;
        const nave = { x: 185, y: 540, w: 40, h: 40, vel: 8, escudo: false };
        const asteroides = []; const tiros = []; const powerups = [];
        const teclas = {};

        window.addEventListener("keydown", (e) => {
            teclas[e.key] = true;
            if (e.key === " " && jogoAtivo) {
                tiros.push({ x: nave.x + nave.w/2 - 2, y: nave.y, w: 4, h: 10, vel: 10 });
            }
        });
        window.addEventListener("keyup", (e) => teclas[e.key] = false);

        function atualizar() {
            if (!jogoAtivo) return;

            if ((teclas["ArrowLeft"] || teclas["a"]) && nave.x > 0) nave.x -= nave.vel;
            if ((teclas["ArrowRight"] || teclas["d"]) && nave.x < canvas.width - nave.w) nave.x += nave.vel;

            if (Math.random() < 0.02) {
                const tam = Math.random() * 30 + 30;
                asteroides.push({ x: Math.random() * (canvas.width - tam), y: -tam, w: tam, h: tam, vel: Math.random() * 2 + 3 });
            }

            // Movimentação de tiros e asteroides (Lógica simplificada para o exemplo)
            asteroides.forEach((a, i) => {
                a.y += a.vel;
                if (a.y > canvas.height) { asteroides.splice(i, 1); pontos++; }
                // Colisão com Nave
                if (nave.x < a.x + a.w && nave.x + nave.w > a.x && nave.y < a.y + a.h) {
                    vidas--; asteroides.splice(i, 1);
                    if(vidas <= 0) location.reload();
                }
            });

            tiros.forEach((t, i) => {
                t.y -= t.vel;
                if (t.y < 0) tiros.splice(i, 1);
            });

            document.getElementById("pontos").innerText = pontos;
            document.getElementById("vidas").innerText = vidas;
        }

        function desenhar() {
            // Desenha o Fundo
            if (imgFundo.complete) {
                ctx.drawImage(imgFundo, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Desenha a Nave
            if (imgNave.complete) {
                ctx.drawImage(imgNave, nave.x, nave.y, nave.w, nave.h);
            } else {
                ctx.fillStyle = "lime";
                ctx.fillRect(nave.x, nave.y, nave.w, nave.h);
            }

            // Desenha Asteroides
            asteroides.forEach(a => {
                if (imgAsteroide.complete) {
                    ctx.drawImage(imgAsteroide, a.x, a.y, a.w, a.h);
                } else {
                    ctx.fillStyle = "gray";
                    ctx.fillRect(a.x, a.y, a.w, a.h);
                }
            });

            // Tiros
            ctx.fillStyle = "red";
            tiros.forEach(t => ctx.fillRect(t.x, t.y, t.w, t.h));

            requestAnimationFrame(() => { atualizar(); desenhar(); });
        }

        desenhar();
    </script>
</body>
</html>
