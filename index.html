<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nave Estelar - INFINITO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #00ffcc; font-family: 'Courier New', monospace; }
        canvas { border: 2px solid #00ffcc; background: #000; display: none; box-shadow: 0 0 20px #00ffcc; }
        #menu { text-align: center; border: 2px solid #00ffcc; padding: 40px; background: rgba(0,0,0,0.9); }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; color: #000; }
        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 18px; line-height: 1.2; }
        .boss-bar { width: 200px; height: 10px; background: #333; border: 1px solid white; display: none; margin-top: 5px; }
        #boss-hp { width: 100%; height: 100%; background: red; }
        #recorde-ui { color: gold; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>INVASÃO INFINITA</h1>
        <p>RECORDRE ATUAL: <span id="high-score-menu">0</span></p>
        <button onclick="iniciar()">DECOLAR!</button>
    </div>

    <div id="ui">
        PONTOS: <span id="pts">0</span> | VIDAS: <span id="vds">3</span><br>
        <span id="recorde-ui">RECORDE: <span id="high-score">0</span></span><br>
        <span id="status-power" style="color: gold;"></span>
        <div id="boss-ui">
            <div id="boss-text" style="color: red; font-weight: bold;"></div>
            <div class="boss-bar" id="boss-container"><div id="boss-hp"></div></div>
        </div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let pontos = 0, vidas = 3, ativo = false, audioCtx;
        let recorde = localStorage.getItem("recordeNave") || 0;
        let proximoBoss = 100;
        let multiplicadorDificuldade = 1;

        const nave = { x: 180, y: 530, w: 40, h: 40, escudo: false, triplo: false };
        const tiros = [], inimigos = [], tirosInimigos = [], powerups = [], estrelas = [];
        const teclas = {};
        let boss = { ativo: false, x: 50, y: -80, w: 120, h: 40, hp: 20, max: 20, dir: 1, nivel: 1 };

        // Recorde inicial
        document.getElementById("high-score-menu").innerText = recorde;
        document.getElementById("high-score").innerText = recorde;

        for(let i=0; i<50; i++) estrelas.push({x: Math.random()*400, y: Math.random()*600, v: Math.random()*3 + 1});

        function som(f, t, d, gVal = 0.1) {
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(gVal, audioCtx.currentTime);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        window.onkeydown = e => { teclas[e.key] = true; if(e.key === " " && ativo) disparar(); };
        window.onkeyup = e => teclas[e.key] = false;

        function disparar() {
            tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: 0});
            if(nave.triplo) {
                tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: -3});
                tiros.push({x: nave.x + 18, y: nave.y, w: 4, h: 12, vx: 3});
            }
            som(600, 'triangle', 0.08);
        }

        function iniciar() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true; loop();
        }

        function spawnBoss() {
            boss.ativo = true;
            boss.max = 20 + (boss.nivel * 10);
            boss.hp = boss.max;
            boss.y = -80;
            document.getElementById("boss-container").style.display = "block";
            document.getElementById("boss-text").innerText = "BOSS NÍVEL " + boss.nivel;
            som(100, 'sawtooth', 0.5, 0.2);
        }

        function loop() {
            if(!ativo) return;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrelas
            ctx.fillStyle = "white";
            estrelas.forEach(s => { s.y += s.v; if(s.y > 600) s.y = 0; ctx.fillRect(s.x, s.y, 2, 2); });

            // Movimento Nave
            if((teclas.ArrowLeft || teclas.a) && nave.x > 0) nave.x -= 8;
            if((teclas.ArrowRight || teclas.d) && nave.x < 360) nave.x += 8;

            // Gatilho do Boss Infinito
            if(!boss.ativo && pontos >= proximoBoss) {
                spawnBoss();
                proximoBoss += 150; // Próximo boss 150 pontos depois
            }

            // Lógica Boss
            if(boss.ativo) {
                if(boss.y < 60) boss.y += 2;
                boss.x += boss.dir * (2 + boss.nivel);
                if(boss.x <= 0 || boss.x >= 280) boss.dir *= -1;
                if(Math.random() < 0.03 + (boss.nivel * 0.01)) {
                    tirosInimigos.push({x: boss.x + boss.w/2, y: boss.y + boss.h, w: 6, h: 15});
                }
                ctx.fillStyle = "#ff0000"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                ctx.fillStyle = "white"; ctx.fillRect(boss.x+10, boss.y+10, 20, 10); ctx.fillRect(boss.x+90, boss.y+10, 20, 10);
            } else {
                // Só cria meteoros se não tiver Boss
                if(Math.random() < 0.03) inimigos.push({x: Math.random()*360, y: -40, v: 3 + (pontos/200)});
            }

            if(Math.random() < 0.003) powerups.push({x: Math.random()*370, y: -30, tipo: Math.random()>0.5?'escudo':'triplo', w:20, h:20});

            // Tiros Jogador
            tiros.forEach((t, i) => {
                t.y -= 12; t.x += t.vx;
                ctx.fillStyle = "#0ff"; ctx.fillRect(t.x, t.y, t.w, t.h);
                if(t.y < 0) tiros.splice(i, 1);
                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) {
                        boss.ativo = false; boss.nivel++; pontos += 100;
                        document.getElementById("boss-container").style.display = "none";
                        document.getElementById("boss-text").innerText = "";
                        som(200, 'square', 0.5);
                    }
                }
            });

            // Tiros Inimigos (Boss)
            tirosInimigos.forEach((t, i) => {
                t.y += 7; ctx.fillStyle = "yellow"; ctx.fillRect(t.x, t.y, t.w, t.h);
                if(t.x > nave.x && t.x < nave.x + 40 && t.y > nave.y && t.y < nave.y + 40) {
                    tirosInimigos.splice(i,1); if(!nave.escudo) vidas--; som(80, 'sawtooth', 0.2);
                }
                if(t.y > 600) tirosInimigos.splice(i, 1);
            });

            // Meteoros
            inimigos.forEach((m, i) => {
                m.y += m.v;
                ctx.fillStyle = "#777"; ctx.beginPath(); ctx.arc(m.x+20, m.y+20, 18, 0, 7); ctx.fill();
                if(nave.x < m.x + 35 && nave.x + 40 > m.x && nave.y < m.y + 35 && nave.y + 40 > m.y) {
                    inimigos.splice(i,1); if(!nave.escudo) vidas--; som(100, 'sawtooth', 0.2);
                }
                tiros.forEach((t, ti) => {
                    if(t.x < m.x + 40 && t.x + 4 > m.x && t.y < m.y + 40) {
                        inimigos.splice(i,1); tiros.splice(ti,1); pontos += 5; som(300, 'sine', 0.05);
                    }
                });
                if(m.y > 600) inimigos.splice(i,1);
            });

            // Powerups
            powerups.forEach((p, i) => {
                p.y += 3; ctx.fillStyle = p.tipo==='escudo'?'#0af':'#fa0';
                ctx.beginPath(); ctx.arc(p.x+10, p.y+10, 10, 0, 7); ctx.fill();
                if(nave.x < p.x + 20 && nave.x + 40 > p.x && nave.y < p.y + 40) {
                    ativarPower(p.tipo); powerups.splice(i,1);
                }
            });

            // Desenha Nave
            ctx.fillStyle = nave.escudo ? "#0ff" : "#0f8";
            ctx.beginPath(); ctx.moveTo(nave.x+20, nave.y); ctx.lineTo(nave.x, nave.y+40); ctx.lineTo(nave.x+40, nave.y+40); ctx.fill();
            if(nave.escudo) { ctx.strokeStyle="white"; ctx.strokeRect(nave.x-5, nave.y-5, 50, 50); }

            // Placar e Recorde
            if(pontos > recorde) { recorde = pontos; localStorage.setItem("recordeNave", recorde); }
            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            document.getElementById("high-score").innerText = recorde;

            if(vidas <= 0) { alert("GAME OVER! PONTOS: " + pontos); location.reload(); }
            requestAnimationFrame(loop);
        }

        function ativarPower(tipo) {
            if(tipo === 'escudo') {
                nave.escudo = true; document.getElementById("status-power").innerText = "ESCUDO!";
                setTimeout(() => { nave.escudo = false; document.getElementById("status-power").innerText = ""; }, 6000);
            } else {
                nave.triplo = true; document.getElementById("status-power").innerText = "TIRO TRIPLO!";
                setTimeout(() => { nave.triplo = false; document.getElementById("status-power").innerText = ""; }, 8000);
            }
            som(800, 'sine', 0.2, 0.2);
        }
    </script>
</body>
</html>
