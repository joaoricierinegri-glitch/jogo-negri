<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Hub Pro - Edição Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 40px 20px; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1; opacity: 0.4;
        }

        .container {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.3); padding: 40px; border-radius: 30px;
            width: 100%; max-width: 600px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h2 { font-family: 'Orbitron'; text-align: center; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 30px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }

        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid #333;
            border-radius: 8px; color: var(--neon); font-family: 'Orbitron'; outline: none; box-sizing: border-box;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .btn {
            width: 100%; padding: 15px; margin-top: 20px; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; border-radius: 10px; transition: 0.3s; text-transform: uppercase;
        }

        .btn-launch { border: 2px solid var(--neon); background: transparent; color: var(--neon); }
        .btn-launch:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        .btn-download { 
            border: 2px solid var(--purple); background: transparent; color: var(--purple); 
            max-width: 300px; margin: 30px auto; 
        }
        .btn-download:hover { background: var(--purple); color: white; box-shadow: 0 0 20px var(--purple); }

        .list-section { width: 100%; max-width: 800px; margin-top: 40px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        tr { background: rgba(255,255,255,0.03); transition: 0.3s; }
        tr:hover { background: rgba(0, 242, 255, 0.08); }
        td, th { padding: 15px; text-align: left; }
        .actions button { cursor: pointer; border: none; padding: 5px 10px; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .edit-btn { background: var(--neon); }
        .del-btn { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Terminal de Comando</h2>
        <form id="spaceForm">
            <input type="hidden" id="editId">
            <div class="grid">
                <div class="input-group full"><input type="text" id="nome" placeholder="NOME DO TRIPULANTE" required></div>
                <div class="input-group"><input type="text" id="cpf" placeholder="CPF"></div>
                <div class="input-group"><input type="text" id="cep" placeholder="CEP" onblur="apiCEP(this.value)"></div>
                <div class="input-group full"><input type="text" id="rua" placeholder="ENDEREÇO"></div>
                <div class="input-group full"><input type="text" id="cidade" placeholder="PLANETA/CIDADE"></div>
            </div>
            <button type="submit" id="mainBtn" class="btn btn-launch">Lançar Dados</button>
        </form>
    </div>

    <button class="btn btn-download" onclick="baixarDados()">📥 Extrair Log de Dados (.txt)</button>

    <div class="list-section">
        <table id="tabela">
            <thead><tr><th>Nome</th><th>Identificação</th><th>Base</th><th>Ações</th></tr></thead>
            <tbody id="listaCorpo"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, t) {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + t);
        }

        let db = JSON.parse(localStorage.getItem('space_db')) || [];

        function apiCEP(v) {
            fetch(`https://viacep.com.br/ws/${v.replace(/\D/g,'')}/json/`).then(r => r.json()).then(d => {
                if(!d.erro) {
                    document.getElementById('rua').value = d.logradouro;
                    document.getElementById('cidade').value = d.localidade;
                    playSound(600, 0.1);
                }
            });
        }

        document.getElementById('spaceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            playSound(1000, 0.2);
            const id = document.getElementById('editId').value;
            const tripulante = {
                id: id || Date.now().toString(),
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                cidade: document.getElementById('cidade').value
