<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Star Battle: Rebel Alliance</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ffe81f; font-family: 'Arial Black', Gadget, sans-serif; }
        canvas { border: 2px solid #ffe81f; background: #000; display: none; box-shadow: 0 0 20px rgba(255, 232, 31, 0.3); }
        #menu { text-align: center; border: 3px solid #ffe81f; padding: 50px; background: rgba(0,0,0,0.9); border-radius: 10px; }
        h1 { font-size: 40px; letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #ffe81f; border: none; font-weight: bold; color: black; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.1); }
        #ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 18px; text-shadow: 2px 2px #000; color: #ffe81f; }
        .boss-hp-bar { width: 300px; height: 12px; background: #222; border: 2px solid #fff; display: none; margin-top: 5px; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAR BATTLE</h1>
        <p style="color: white; margin-bottom: 30px;">QUE A FORÇA ESTEJA COM VOCÊ</p>
        <p>RECORDE: <span id="hs-menu">0</span></p>
        <button onclick="iniciar()">INICIAR ATAQUE</button>
    </div>

    <div id="ui">
        CREDITOS: <b id="pts">0</b> | ESCUDOS: <b id="vds">3</b><br>
        <span id="pwr-text" style="color: #00ffff;"></span>
        <div id="boss-ui">
            <div id="boss-label" style="color: #ff0000; font-size: 14px; margin-top: 10px; font-weight: bold;">DESTROIER IMPERIAL APREENSIVO</div>
            <div class="boss-hp-bar" id="boss-cont"><div id="boss-hp-fill"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 450; canvas.height = 650;

        // --- ASSETS ESTILO STAR WARS ---
        const imgXwing = new Image(); imgXwing.src = 'https://i.imgur.com/6S79m7v.png'; // Nave Rebelde
        const imgTie = new Image(); imgTie.src = 'https://i.imgur.com/8Bv9szM.png';   // Caça Imperial
        const imgEspaco = new Image(); imgEspaco.src = 'https://i.imgur.com/re9ZpX9.jpg'; // Galáxia
        const imgDestroyer = new Image(); imgDestroyer.src = 'https://i.imgur.com/WvXGjYp.png'; // Grande Nave

        let pontos = 0, vidas = 3, ativo = false, audioCtx, recorde = localStorage.getItem("sw_rec") || 0;
        let pBoss = 150, bNivel = 1;
        const nave = { x: 200, y: 550, w: 50, h: 50, esc: false, trip: false };
        const tiros = [], inimigos = [], tirosInim = [], powers = [], estrelas = [];
        const teclas = {};
        let boss = { ativo: false, x: 150, y: -120, w: 150, h: 90, hp: 40, max: 40, dir: 1 };

        document.getElementById("hs-menu").innerText = recorde;

        // --- SONS ESTILO LASER CINEMA ---
        function playLaser(freq, dur, type = 'square') {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + dur);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function iniciar() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById("menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            ativo = true; loop();
        }

        window.onkeydown = e => { teclas[e.key] = true; if(e.key === " " && ativo) atirar(); };
        window.onkeyup = e => teclas[e.key] = false;

        function atirar() {
            const corLaser = nave.trip ? "#00ffff" : "#f00"; // Vermelho estilo Rebelde
            tiros.push({x: nave.x + 23, y: nave.y, w: 3, h: 20, vx: 0, color: corLaser});
            if(nave.trip) {
                tiros.push({x: nave.x + 23, y: nave.y, w: 3, h: 20, vx: -3, color: corLaser});
                tiros.push({x: nave.x + 23, y: nave.y, w: 3, h: 20, vx: 3, color: corLaser});
            }
            playLaser(440, 0.15);
        }

        function loop() {
            if(!ativo) return;
            ctx.clearRect(0,0,450,650);
            
            // Fundo Galáctico
            if(imgEspaco.complete) ctx.drawImage(imgEspaco, 0, 0, 450, 650);
            else { ctx.fillStyle = "#000"; ctx.fillRect(0,0,450,650); }

            // Movimento suave
            if((teclas.ArrowLeft || teclas.a) && nave.x > 0) nave.x -= 8;
            if((teclas.ArrowRight || teclas.d) && nave.x < 400) nave.x += 8;

            // Sistema de Boss (Destroier Imperial)
            if(!boss.ativo && pontos >= pBoss) {
                boss.ativo = true; boss.hp = 40 * bNivel; boss.max = boss.hp;
                document.getElementById("boss-cont").style.display = "block";
                playLaser(100, 0.5, 'sawtooth'); // Som de alerta
            }

            if(boss.ativo) {
                if(boss.y < 50) boss.y += 1;
                boss.x += boss.dir * (1.5 + bNivel);
                if(boss.x <= 0 || boss.x >= 300) boss.dir *= -1;
                if(Math.random() < 0.05) {
                    tirosInim.push({x: boss.x + boss.w/2, y: boss.y + boss.h});
                    playLaser(200, 0.2, 'sine'); // Laser verde do império
                }
                if(imgDestroyer.complete) ctx.drawImage(imgDestroyer, boss.x, boss.y, boss.w, boss.h);
                else { ctx.fillStyle = "gray"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); }
            } else {
                if(Math.random() < 0.04) inimigos.push({x: Math.random()*410, y: -50, v: 4 + (pontos/400)});
            }

            // Power-ups (Cristais Kyber)
            if(Math.random() < 0.003) powers.push({x: Math.random()*400, y: -30, t: Math.random()>0.5?'escudo':'tiro'});

            atualizarJogo();

            // Desenhar X-Wing
            ctx.shadowBlur = nave.esc ? 20 : 0;
            ctx.shadowColor = "#00ffff";
            if(imgXwing.complete) ctx.drawImage(imgXwing, nave.x, nave.y, nave.w, nave.h);
            else { ctx.fillStyle = "white"; ctx.fillRect(nave.x, nave.y, nave.w, nave.h); }
            ctx.shadowBlur = 0;

            document.getElementById("pts").innerText = pontos;
            document.getElementById("vds").innerText = vidas;
            if(vidas <= 0) gameOver();
            requestAnimationFrame(loop);
        }

        function atualizarJogo() {
            // Tiros Laser
            tiros.forEach((t, i) => {
                t.y -= 15; t.x += t.vx;
                ctx.fillStyle = t.color;
                ctx.shadowBlur = 10; ctx.shadowColor = t.color;
                ctx.fillRect(t.x, t.y, t.w, t.h);
                ctx.shadowBlur = 0;
                if(t.y < 0) tiros.splice(i, 1);
                
                if(boss.ativo && t.x > boss.x && t.x < boss.x + boss.w && t.y < boss.y + boss.h) {
                    boss.hp--; tiros.splice(i, 1);
                    document.getElementById("boss-hp-fill").style.width = (boss.hp/boss.max*100) + "%";
                    if(boss.hp <= 0) {
                        boss.ativo = false; bNivel++; pontos += 500; pBoss += 1000;
                        document.getElementById("boss-cont").style.display = "none";
                        playLaser(50, 0.8, 'sawtooth');
                    }
                }
            });

            // Tiros do Império (Verde)
            tirosInim.forEach((t, i) => {
                t.y += 8;
                ctx.fillStyle = "#0f0";
                ctx.shadowBlur = 8; ctx.shadowColor = "#0f0";
                ctx.fillRect(t.x, t.y, 4, 15);
                ctx.shadowBlur = 0;
                if(t.x > nave.x && t.x < nave.x+50 && t.y > nave.y && t.y < nave.y+50) {
                    tirosInim.splice(i, 1); if(!nave.esc) { vidas--; playLaser(60, 0.3, 'sawtooth'); }
                }
                if(t.y > 650) tirosInim.splice(i, 1);
            });

            // Caças TIE
            inimigos.forEach((m, i) => {
                m.y += m.v;
                if(imgTie.complete) ctx.drawImage(imgTie, m.x, m.y, 40, 40);
                else { ctx.fillStyle = "gray"; ctx.beginPath(); ctx.arc(m.x+20, m.y+20, 15, 0, 7); ctx.fill(); }
                
                if(nave.x < m.x + 35 && nave.x + 50 > m.x && nave.y < m.y + 40 && nave.y + 40 > m.y) {
                    inimigos.splice(i, 1); if(!nave.esc) { vidas--; playLaser(60, 0.3, 'sawtooth'); }
                }
                tiros.forEach((t, ti) => {
                    if(t.x > m.x && t.x < m.x + 40 && t.y < m.y + 40 && t.y > m.y) {
                        inimigos.splice(i, 1); tiros.splice(ti, 1); pontos += 20;
                        playLaser(200, 0.1);
                    }
                });
                if(m.y > 650) inimigos.splice(i, 1);
            });

            // Cristais Kyber (Power-ups)
            powers.forEach((p, i) => {
                p.y += 3;
                ctx.fillStyle = p.t === 'escudo' ? "#0af" : "#f0f";
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.moveTo(p.x+10, p.y); ctx.lineTo(p.x+20, p.y+15); ctx.lineTo(p.x+10, p.y+30); ctx.lineTo(p.x, p.y+15); ctx.fill();
                ctx.shadowBlur = 0;
                if(nave.x < p.x + 20 && nave.x + 50 > p.x && nave.y < p.y + 50) {
                    if(p.t === 'escudo') {
                        nave.esc = true; document.getElementById("pwr-text").innerText = "ESCUDO REFORÇADO";
                        setTimeout(() => { nave.esc = false; document.getElementById("pwr-text").innerText = ""; }, 8000);
                    } else {
                        nave.trip = true; document.getElementById("pwr-text").innerText = "CANHÕES TRIPLOS";
                        setTimeout(() => { nave.trip = false; document.getElementById("pwr-text").innerText = ""; }, 12000);
                    }
                    powers.splice(i, 1); playLaser(800, 0.3, 'sine');
                }
            });
        }

        function gameOver() {
            if(pontos > recorde) localStorage.setItem("sw_rec", pontos);
            alert("A ESTRELA DA MORTE VENCEU... PONTOS: " + pontos);
            location.reload();
        }
    </script>
</body>
</html>
