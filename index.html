<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro Pro 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --primary: #6366f1;
            --shadow-dark: #a3b1c6;
            --shadow-light: #ffffff;
        }

        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: #444;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
        }

        h2 { text-align: center; margin-bottom: 30px; font-weight: 800; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #666; }

        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border: 1px solid var(--primary); }

        .btn-save {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 5px 5px 15px var(--shadow-dark);
            transition: 0.2s;
        }

        .btn-save:active { transform: scale(0.98); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2); }

        /* Lista de Clientes */
        .lista-container {
            margin-top: 50px;
            width: 100%;
            max-width: 900px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th { padding: 15px; text-align: left; color: var(--primary); }

        tr.cliente-item {
            background: white;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            border-radius: 15px;
        }

        td { padding: 15px; }
        td:first-child { border-radius: 15px 0 0 15px; }
        td:last-child { border-radius: 0 15px 15px 0; }

        .btn-del { color: #ff4d4d; border: none; background: none; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cadastro de Cliente</h2>
        <form id="cadastroForm">
            <div class="grid">
                <div class="input-group full-width">
                    <label>NOME COMPLETO</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label>CEP (Busca Automática)</label>
                    <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
                </div>
                <div class="input-group full-width">
                    <label>LOGRADOURO (Rua)</label>
                    <input type="text" id="rua" readonly>
                </div>
                <div class="input-group">
                    <label>BAIRRO</label>
                    <input type="text" id="bairro" readonly>
                </div>
                <div class="input-group">
                    <label>CIDADE/UF</label>
                    <input type="text" id="cidade" readonly>
                </div>
            </div>
            <button type="submit" class="btn-save">CADASTRAR CLIENTE</button>
        </form>
    </div>

    <div class="lista-container">
        <h3>Clientes na Base</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaClientes"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // Função para carregar dados do LocalStorage ao abrir a página
        document.addEventListener('DOMContentLoaded', exibirClientes);

        // Busca automática de CEP
        document.getElementById('cep').addEventListener('blur', function() {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(res => res.json())
                    .then(dados => {
                        if (!dados.erro) {
                            document.getElementById('rua').value = dados.logradouro;
                            document.getElementById('bairro').value = dados.bairro;
                            document.getElementById('cidade').value = `${dados.localidade}/${dados.uf}`;
                        } else {
                            alert("CEP não encontrado!");
                        }
                    });
            }
        });

        // Salvar Cliente
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const novoCliente = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                cidade: document.getElementById('cidade').value
            };

            let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            clientes.push(novoCliente);
            localStorage.setItem('clientes', JSON.stringify(clientes));

            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            this.reset();
            exibirClientes();
        });

        function exibirClientes() {
            const lista = document.getElementById('listaClientes');
            let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            lista.innerHTML = clientes.map(c => `
                <tr class="cliente-item">
                    <td>${c.nome}</td>
                    <td>${c.cpf}</td>
                    <td>${c.cidade}</td>
                    <td><button class="btn-del" onclick="remover(${c.id})">Excluir</button></td>
                </tr>
            `).join('');
        }

        function remover(id) {
            let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            clientes = clientes.filter(c => c.id !== id);
            localStorage.setItem('clientes', JSON.stringify(clientes));
            exibirClientes();
        }
    </script>
</body>
</html>
